name: "Build and Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.export.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.2
          include-templates: true

      - name: Export Linux build
        id: export
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux Universal" build/linux/limbo-linux.x86_64
          echo "✅ Linux build completed"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: limbo-linux-x86_64
          path: build/linux/limbo-linux.x86_64

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.2
          include-templates: true

      - name: Export Windows build
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/limbo-windows.exe
          echo "✅ Windows build completed"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: limbo-windows
          path: build/windows/limbo-windows.exe

  check:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Check Linux build
        run: |
          wget https://nightly.link/Hinderchik/limbo-godot-linux/actions/artifacts/limbo-linux-x86_64.zip
          unzip -l limbo-linux-x86_64.zip
          echo "✅ Linux build verified"

      - name: Check Windows build
        run: |
          wget https://nightly.link/Hinderchik/limbo-godot-linux/actions/artifacts/limbo-windows.zip
          unzip -l limbo-windows.zip
          echo "✅ Windows build verified"

      - name: All checks passed
        run: echo "✅ Все сборки успешно проверены!"

  release:
    runs-on: ubuntu-latest
    needs: [check]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: limbo-linux-x86_64
          path: linux

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: limbo-windows
          path: windows

      - name: Make Linux executable
        run: chmod +x linux/limbo-linux.x86_64

      - name: Create ZIP archives
        run: |
          zip -j limbo-linux.zip linux/limbo-linux.x86_64
          zip -j limbo-windows.zip windows/limbo-windows.exe

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Limbo Game ${{ steps.get_version.outputs.VERSION }}"
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🎮 Limbo Keys Minigame
            
            ### 🐧 Linux (x86_64)
            - Скачайте `limbo-linux.zip`
            - Распакуйте: `unzip limbo-linux.zip`
            - Запустите: `./limbo-linux.x86_64`
            
            ### 🪟 Windows (64-bit)
            - Скачайте `limbo-windows.zip`
            - Распакуйте и запустите `limbo-windows.exe`
            
            ### 📝 Что нового
            - Добавлен фейк-терминал для Linux
            - Исправлены баги с прозрачностью
            - Оптимизация для слабых ПК
            
            > [!NOTE]
            > Игра автоматически определяет ОС и показывает соответствующий экран завершения
          files: |
            limbo-linux.zip
            limbo-windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}