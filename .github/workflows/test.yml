name: "Build and Release"

on:
  push:
    paths-ignore:
      - 'README.md'
  pull_request:
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.2
          include-templates: true

      - name: Export Linux build
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux Universal" build/linux/limbo-linux.x86_64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: limbo-linux-x86_64
          path: build/linux/limbo-linux.x86_64

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.2
          include-templates: true

      - name: Export Windows build
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/limbo-windows.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: limbo-windows
          path: build/windows/limbo-windows.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: limbo-linux-x86_64
          path: linux

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: limbo-windows
          path: windows

      - name: Make Linux executable
        run: chmod +x linux/limbo-linux.x86_64

      - name: Create ZIP archives
        run: |
          zip -j limbo-linux.zip linux/limbo-linux.x86_64
          zip -j limbo-windows.zip windows/limbo-windows.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: |
            limbo-linux.zip
            limbo-windows.zip
          draft: false
          prerelease: true