name: "Build and Release"

on:
  push:
    paths-ignore:
      - 'README.md'
  pull_request:
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.2
          include-templates: true

      - name: Export Linux x86_64 build
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux Universal" build/linux/limbo-linux.x86_64

      - name: Upload Linux x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: limbo-linux-x86_64
          path: build/linux/limbo-linux.x86_64

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.2
          include-templates: true

      - name: Export Linux ARM64 build
        run: |
          mkdir -p build/linux-arm64
          godot --headless --export-release "Linux Universal ARM64" build/linux-arm64/limbo-linux-arm64

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: limbo-linux-arm64
          path: build/linux-arm64/limbo-linux-arm64

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.2
          include-templates: true

      - name: Export Windows build
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/limbo-windows.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: limbo-windows
          path: build/windows/limbo-windows.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-linux-arm64, build-windows]
    steps:
      - name: Download Linux x86_64 build
        uses: actions/download-artifact@v4
        with:
          name: limbo-linux-x86_64
          path: linux-x86_64

      - name: Download Linux ARM64 build
        uses: actions/download-artifact@v4
        with:
          name: limbo-linux-arm64
          path: linux-arm64

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: limbo-windows
          path: windows

      - name: Make Linux builds executable
        run: |
          chmod +x linux-x86_64/limbo-linux.x86_64
          chmod +x linux-arm64/limbo-linux-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: |
            linux-x86_64/limbo-linux.x86_64
            linux-arm64/limbo-linux-arm64
            windows/limbo-windows.exe
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}