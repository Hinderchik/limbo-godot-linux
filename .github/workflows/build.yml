name: Build Godot Game

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Godot 4.2.2
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64
          mv Godot_v4.2.2-stable_linux.x86_64 godot_exec
          
          # Скачиваем экспортные шаблоны
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          
          # Создаём правильную структуру папок (обрати внимание: .stable а не -stable)
          mkdir -p /home/runner/.local/share/godot/export_templates/4.2.2.stable
          unzip Godot_v4.2.2-stable_export_templates.tpz -d /home/runner/.local/share/godot/export_templates/4.2.2.stable/
          
          # Проверяем, что файлы распаковались
          ls -la /home/runner/.local/share/godot/export_templates/4.2.2.stable/templates/

      - name: Export Linux build
        run: |
          mkdir -p builds
          # Открываем проект один раз для импорта ресурсов
          ./godot_exec --headless --import
          # Экспортируем
          ./godot_exec --headless --export-release "Linux Universal" builds/limbo-linux.x86_64

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: limbo-linux-x86_64
          path: builds/limbo-linux.x86_64