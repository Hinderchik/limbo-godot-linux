name: Build Godot Game

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Godot 4.4
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip
          unzip Godot_v4.4-stable_linux.x86_64.zip
          chmod +x Godot_v4.4-stable_linux.x86_64
          mv Godot_v4.4-stable_linux.x86_64 godot_exec
          
          wget https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz
          
          # Правильный путь для экспортных шаблонов
          mkdir -p /home/runner/.local/share/godot/export_templates/4.4.stable
          cd /home/runner/.local/share/godot/export_templates/4.4.stable
          unzip -o $GITHUB_WORKSPACE/Godot_v4.4-stable_export_templates.tpz
          ls -la
          cd $GITHUB_WORKSPACE

      - name: Export Linux build
        run: |
          mkdir -p builds
          ./godot_exec --headless --export-release "Linux Universal" builds/limbo-linux.x86_64

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: limbo-linux-x86_64
          path: builds/limbo-linux.x86_64