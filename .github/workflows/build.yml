name: Build Godot Game

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Godot 4.2.2 (Standard Linux Build)
        run: |
          # Используем официальную ссылку, которая точно работает
          wget -O godot.zip https://downloads.tuxfamily.org/godotengine/4.2.2/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip godot.zip
          # Переименовываем скачанный исполняемый файл для удобства
          mv Godot_v4.2.2-stable_linux.x86_64 godot_exec
          chmod +x godot_exec

      - name: Export Linux build
        run: |
          mkdir -p builds
          # Используем скачанный godot_exec для экспорта
          ./godot_exec --headless --export-release "Linux Universal" builds/limbo-linux.x86_64

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: limbo-linux-x86_64
          path: builds/limbo-linux.x86_64