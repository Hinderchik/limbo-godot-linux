name: Build Godot Game

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Godot 4.2.2 Headless
        run: |
          wget https://github.com/godotengine/godot-builds/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux_headless.64.zip
          unzip Godot_v4.2.2-stable_linux_headless.64.zip
          chmod +x Godot_v4.2.2-stable_linux_headless.64

      - name: Export Linux build
        run: |
          mkdir -p builds
          ./Godot_v4.2.2-stable_linux_headless.64 --headless --export-release "Linux Universal" builds/limbo-linux.x86_64

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: limbo-linux-x86_64
          path: builds/limbo-linux.x86_64
